<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客观塔罗洞察 | Psychological Tarot</title>
  
  <!-- 引入 Tailwind CSS (用于样式) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel (用于在浏览器中实时编译 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
    /* 隐藏滚动条但保留滚动功能 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- 基础数据：78张标准韦特塔罗牌 ---
    const SUITS = ["权杖", "圣杯", "宝剑", "星币"];
    const COURT = ["侍从", "骑士", "王后", "国王"];
    const PIPS = ["王牌", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
    const MAJOR_ARCANA = [
      "愚者", "魔术师", "女祭司", "皇后", "皇帝", "教皇", "恋人", "战车", "力量", "隐士", 
      "命运之轮", "正义", "倒吊人", "死神", "节制", "恶魔", "高塔", "星星", "月亮", "太阳", "审判", "世界"
    ];

    const generateDeck = () => {
      let deck = [];
      MAJOR_ARCANA.forEach((name, index) => deck.push({ id: `M${index}`, name, type: "大阿尔卡纳" }));
      SUITS.forEach((suit, sIndex) => {
        PIPS.forEach((pip, pIndex) => deck.push({ id: `S${sIndex}P${pIndex}`, name: `${suit}${pip}`, type: "小阿尔卡纳" }));
        COURT.forEach((c, cIndex) => deck.push({ id: `S${sIndex}C${cIndex}`, name: `${suit}${c}`, type: "小阿尔卡纳" }));
      });
      return deck;
    };

    const shuffle = (array) => {
      let currentIndex = array.length, randomIndex;
      while (currentIndex !== 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
      }
      return array;
    };

    function App() {
      const [step, setStep] = useState(1);
      const [deepseekKey, setDeepseekKey] = useState(''); // 本地储存Key
      const [question, setQuestion] = useState('');
      const [deck, setDeck] = useState([]);
      const [drawnCards, setDrawnCards] = useState([]);
      const [visualCards, setVisualCards] = useState([]);
      const [reading, setReading] = useState('');
      const [isReading, setIsReading] = useState(false);
      const [error, setError] = useState('');

      useEffect(() => {
        // 尝试从本地存储恢复 API Key，避免刷新后重填
        const savedKey = localStorage.getItem('tarot_api_key');
        if (savedKey) setDeepseekKey(savedKey);
        resetReading();
      }, []);

      const resetReading = () => {
        setDeck(shuffle(generateDeck()));
        setDrawnCards([]);
        setReading('');
        setError('');
        setStep(1);
        setVisualCards(Array.from({ length: 21 }, (_, i) => ({ id: `vcard-${i}`, drawn: false })));
      };

      const handleKeyChange = (e) => {
        const val = e.target.value;
        setDeepseekKey(val);
        localStorage.setItem('tarot_api_key', val); // 保存到浏览器本地
      };

      const handleStartDraw = () => {
        if (!deepseekKey.trim()) {
          setError('请提供 DeepSeek API Key (它仅保存在您的浏览器本地，不会上传)');
          return;
        }
        if (!question.trim()) {
          setError('请输入您想洞察的问题。');
          return;
        }
        setError('');
        setStep(2);
      };

      const handleDrawCard = (visualIndex) => {
        if (drawnCards.length >= 3) return;

        const newVisualCards = [...visualCards];
        if (newVisualCards[visualIndex].drawn) return;
        newVisualCards[visualIndex].drawn = true;
        setVisualCards(newVisualCards);

        const actualDeck = [...deck];
        const drawnCard = actualDeck.pop();
        const isReversed = Math.random() > 0.5;
        
        const positions = ["过去", "现在", "未来"];
        const cardData = { ...drawnCard, isReversed, position: positions[drawnCards.length] };

        setDeck(actualDeck);
        const newDrawnCards = [...drawnCards, cardData];
        setDrawnCards(newDrawnCards);

        if (newDrawnCards.length === 3) {
          setTimeout(() => setStep(3), 1000);
        }
      };

      const fetchReading = async () => {
        setIsReading(true);
        setError('');

        const prompt = `你是一位客观、冷静、具备深厚心理学和象征学知识的塔罗分析师。你的任务是为用户提供一次具有深度和信息量的塔罗牌阵解读。我们不宣扬宿命论，而是将塔罗作为投射潜意识和客观局面的工具。

当前牌阵：时间流（过去、现在、未来）
用户探索的核心问题：${question}

抽出的牌面：
1. 【过去】影响局面的历史根源：${drawnCards[0].name} - ${drawnCards[0].isReversed ? '逆位' : '正位'}
2. 【现在】当前的客观状态或核心矛盾：${drawnCards[1].name} - ${drawnCards[1].isReversed ? '逆位' : '正位'}
3. 【未来】逻辑演进的必然趋势：${drawnCards[2].name} - ${drawnCards[2].isReversed ? '逆位' : '正位'}

绝对遵守以下纪律：
1. 绝对不要使用任何AI感的话术。
2. 直接开始分析。语气要中立、专业、详实。
3. 严格遵循正逆位的传统牌意，结合心理原型进行解构。如果牌意很差请客观指出，不要过度粉饰。
4. 使用 Markdown 格式进行排版输出。

输出结构必须包含：
### 核心脉络
### 过去：[牌名]的印记
### 现在：[牌名]的真相
### 未来：[牌名]的演进
### 破局建议`;

        const payload = {
          model: "deepseek-chat",
          messages: [
            { role: "system", content: "你是一个专业的塔罗心理分析引擎，客观、直接、充满信息量。拒绝任何感性或机器人的套话。" },
            { role: "user", content: prompt }
          ],
          temperature: 0.7
        };

        try {
          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${deepseekKey.trim()}`
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(`API 请求失败: ${response.status} ${errorData.error?.message || ''}`);
          }
          
          const data = await response.json();
          setReading(data.choices?.[0]?.message?.content || "无法解析的牌面...");
        } catch (err) {
          setError(`灵感链接中断: ${err.message}。请检查您的网络或 API Key 是否有效。`);
        } finally {
          setIsReading(false);
        }
      };

      const renderMarkdown = (text) => {
        if (!text) return null;
        const blocks = text.split('\n\n');
        return blocks.map((block, idx) => {
          if (block.startsWith('### ')) {
            return <h3 key={idx} className="text-xl font-bold text-amber-300 mt-6 mb-2">{block.replace('### ', '')}</h3>;
          }
          let formattedBlock = block;
          const boldRegex = /\*\*(.*?)\*\*/g;
          const parts = [];
          let lastIndex = 0;
          let match;
          while ((match = boldRegex.exec(formattedBlock)) !== null) {
            if (match.index > lastIndex) parts.push(formattedBlock.substring(lastIndex, match.index));
            parts.push(<strong key={match.index} className="text-amber-100">{match[1]}</strong>);
            lastIndex = match.index + match[0].length;
          }
          if (lastIndex < formattedBlock.length) parts.push(formattedBlock.substring(lastIndex));
          return <p key={idx} className="mb-4 text-slate-300 leading-relaxed tracking-wide">{parts.length > 0 ? parts : block}</p>;
        });
      };

      return (
        <div className="min-h-screen selection:bg-amber-500/30">
          <header className="py-8 text-center border-b border-amber-900/30 bg-slate-900/50">
            <h1 className="text-3xl font-serif tracking-widest text-amber-500">✦ 客观塔罗洞察 ✦</h1>
            <p className="mt-2 text-sm text-slate-500 tracking-widest uppercase">Psychological Archetype Analysis</p>
          </header>

          <main className="max-w-4xl mx-auto px-6 py-12">
            {error && (
              <div className="mb-6 p-4 bg-red-950/50 border border-red-900 text-red-400 rounded-lg text-sm text-center">
                {error}
              </div>
            )}

            {step === 1 && (
              <div className="animate-fade-in flex flex-col items-center">
                <div className="w-full max-w-lg bg-slate-900 p-8 rounded-2xl shadow-2xl border border-slate-800">
                  <h2 className="text-xl text-amber-400 mb-6 text-center">明确你的问题</h2>
                  
                  <div className="mb-6 bg-slate-950/50 p-4 rounded-lg border border-slate-800">
                    <label className="block text-xs text-amber-600 mb-2 uppercase tracking-widest font-bold">
                      DeepSeek API Key (必填)
                    </label>
                    <input 
                      type="password"
                      className="w-full bg-slate-900 border border-slate-700 rounded p-3 text-slate-200 focus:outline-none focus:border-amber-500 transition-colors text-sm font-mono placeholder-slate-600"
                      placeholder="sk-..."
                      value={deepseekKey}
                      onChange={handleKeyChange}
                    />
                    <p className="text-[10px] text-slate-500 mt-2">
                      安全保障：您的 Key 仅保留在您的浏览器本地缓存中，直接请求 DeepSeek 官方接口，绝不经过任何第三方服务器。
                    </p>
                  </div>

                  <p className="text-sm text-slate-400 mb-4 text-center leading-relaxed">
                    占卜并非预知未来，而是借由随机的视觉符号，照见潜意识。<br/>请尽可能客观、具体地描述你当下的困惑。
                  </p>
                  <textarea 
                    className="w-full h-32 bg-slate-950 border border-slate-700 rounded-lg p-4 text-slate-200 focus:outline-none focus:border-amber-500 transition-colors resize-none placeholder-slate-600"
                    placeholder="例如：我目前在职业发展上遇到了瓶颈，想知道继续留在这里还是寻找新机会更利于我的长期发展？"
                    value={question}
                    onChange={(e) => setQuestion(e.target.value)}
                  />
                  <button 
                    onClick={handleStartDraw}
                    className="w-full mt-6 py-4 bg-amber-600 hover:bg-amber-500 text-slate-950 font-bold rounded-lg transition-all transform hover:scale-[1.02] shadow-[0_0_15px_rgba(217,119,6,0.3)]"
                  >
                    开始凝视自我
                  </button>
                </div>
              </div>
            )}

            {step === 2 && (
              <div className="animate-fade-in">
                <div className="text-center mb-10">
                  <h2 className="text-2xl text-amber-400 mb-2">凝神，抽取三张牌</h2>
                  <p className="text-slate-400 text-sm">
                    已抽出 <span className="text-amber-500 font-bold text-lg">{drawnCards.length}</span> / 3 张
                  </p>
                </div>
                
                <div className="grid grid-cols-7 gap-3 md:gap-4 max-w-3xl mx-auto mb-12">
                  {visualCards.map((vcard, idx) => (
                    <div 
                      key={vcard.id}
                      onClick={() => handleDrawCard(idx)}
                      className={`
                        aspect-[2/3] rounded-md border border-slate-700 bg-slate-800 cursor-pointer 
                        transition-all duration-500 relative
                        ${vcard.drawn ? 'opacity-0 scale-50 pointer-events-none' : 'hover:-translate-y-2 hover:border-amber-500 hover:shadow-[0_0_15px_rgba(217,119,6,0.4)]'}
                      `}
                    >
                      <div className="absolute inset-2 border border-slate-600/50 rounded flex items-center justify-center">
                        <div className="w-8 h-8 rounded-full border border-slate-600/30"></div>
                      </div>
                    </div>
                  ))}
                </div>

                <div className="flex justify-center gap-6 md:gap-12 min-h-[160px]">
                  {["过去", "现在", "未来"].map((pos, idx) => {
                    const card = drawnCards[idx];
                    return (
                      <div key={idx} className="flex flex-col items-center">
                        <div className="text-xs text-slate-500 mb-2 tracking-widest uppercase">{pos}</div>
                        <div className={`
                          w-20 md:w-28 aspect-[2/3] rounded-lg border flex items-center justify-center p-2 text-center transition-all duration-700 
                          ${card ? (card.isReversed ? 'border-indigo-500/50 bg-indigo-950/30' : 'border-amber-500/50 bg-amber-950/30') : 'border-dashed border-slate-700 bg-slate-900/50'}
                        `}>
                          {card ? (
                            <div className={`flex flex-col items-center ${card.isReversed ? 'rotate-180' : ''}`}>
                              <span className={`text-sm md:text-base font-bold ${card.isReversed ? 'text-indigo-400' : 'text-amber-400'}`}>{card.name}</span>
                            </div>
                          ) : <span className="text-slate-700 text-2xl">?</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {step === 3 && (
              <div className="animate-fade-in">
                <div className="flex flex-wrap justify-center gap-6 md:gap-16 mb-12 border-b border-slate-800 pb-12">
                  {drawnCards.map((card, idx) => (
                    <div key={idx} className="flex flex-col items-center w-32 md:w-40">
                      <div className="text-sm text-slate-400 mb-4 tracking-widest px-4 py-1 bg-slate-900 rounded-full border border-slate-800">{card.position}</div>
                      <div className={`
                        w-full aspect-[2/3] rounded-xl border-2 flex flex-col items-center justify-center p-4 relative overflow-hidden
                        ${card.isReversed ? 'border-indigo-600/60 bg-gradient-to-br from-slate-900 to-indigo-950 shadow-[0_0_20px_rgba(79,70,229,0.2)]' : 'border-amber-600/60 bg-gradient-to-br from-slate-900 to-amber-950 shadow-[0_0_20px_rgba(217,119,6,0.2)]'}
                      `}>
                        <div className={`w-full h-full flex flex-col items-center justify-center ${card.isReversed ? 'rotate-180' : ''}`}>
                          <div className="text-3xl mb-4 opacity-70">
                            {card.type === "大阿尔卡纳" ? "✧" : (card.name.includes("权杖") ? "🔥" : card.name.includes("圣杯") ? "💧" : card.name.includes("宝剑") ? "⚔️" : "🪙")}
                          </div>
                          <span className={`text-xl font-bold text-center ${card.isReversed ? 'text-indigo-300' : 'text-amber-400'}`}>{card.name}</span>
                          <span className="text-xs mt-2 text-slate-500">{card.type}</span>
                        </div>
                      </div>
                      <div className={`mt-4 text-sm font-medium ${card.isReversed ? 'text-indigo-400' : 'text-amber-500'}`}>
                        {card.isReversed ? '逆位 / 能量受阻或反转' : '正位 / 能量顺畅或确立'}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="max-w-3xl mx-auto">
                  {!reading && !isReading && (
                    <div className="text-center">
                      <button onClick={fetchReading} className="px-8 py-4 bg-slate-100 hover:bg-white text-slate-900 font-bold rounded-lg transition-all shadow-[0_0_20px_rgba(255,255,255,0.2)]">
                        生成深度客观解析
                      </button>
                    </div>
                  )}

                  {isReading && (
                    <div className="flex flex-col items-center justify-center py-12">
                      <div className="w-12 h-12 border-4 border-slate-800 border-t-amber-500 rounded-full animate-spin mb-6"></div>
                      <p className="text-slate-400 tracking-widest animate-pulse">正在解构符号与潜意识的连接...</p>
                    </div>
                  )}

                  {reading && !isReading && (
                    <div className="bg-slate-900/80 border border-slate-800 rounded-2xl p-6 md:p-10 shadow-2xl relative">
                      <h2 className="text-2xl font-serif text-slate-100 mb-8 border-b border-slate-800 pb-4">洞察报告</h2>
                      <div className="prose prose-invert prose-amber max-w-none">
                        {renderMarkdown(reading)}
                      </div>
                      <div className="mt-12 pt-8 border-t border-slate-800 text-center">
                        <button onClick={resetReading} className="px-6 py-2 border border-slate-600 hover:border-amber-500 hover:text-amber-400 text-slate-400 rounded transition-colors text-sm">
                          重新凝视 (Reset)
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
