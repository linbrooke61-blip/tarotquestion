<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>客观塔罗洞察 | Psychological Tarot</title>
  
  <!-- 引入 Tailwind CSS (用于样式) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 和 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 引入 Babel (用于在浏览器中实时编译 JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #020617; color: #e2e8f0; font-family: sans-serif; overflow-x: hidden; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeIn 0.8s ease-out forwards; }
    /* 隐藏滚动条但保留滚动功能 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- 基础数据：78张标准韦特塔罗牌 ---
    const SUITS = ["权杖", "圣杯", "宝剑", "星币"];
    const COURT = ["侍从", "骑士", "王后", "国王"];
    const PIPS = ["王牌", "二", "三", "四", "五", "六", "七", "八", "九", "十"];
    const MAJOR_ARCANA = [
      "愚者", "魔术师", "女祭司", "皇后", "皇帝", "教皇", "恋人", "战车", "力量", "隐士", 
      "命运之轮", "正义", "倒吊人", "死神", "节制", "恶魔", "高塔", "星星", "月亮", "太阳", "审判", "世界"
    ];

    const generateDeck = () => {
      let deck = [];
      MAJOR_ARCANA.forEach((name, index) => deck.push({ id: `M${index}`, name, type: "大阿尔卡纳" }));
      SUITS.forEach((suit, sIndex) => {
        PIPS.forEach((pip, pIndex) => deck.push({ id: `S${sIndex}P${pIndex}`, name: `${suit}${pip}`, type: "小阿尔卡纳" }));
        COURT.forEach((c, cIndex) => deck.push({ id: `S${sIndex}C${cIndex}`, name: `${suit}${c}`, type: "小阿尔卡纳" }));
      });
      return deck;
    };

    const shuffle = (array) => {
      let currentIndex = array.length, randomIndex;
      while (currentIndex !== 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
      }
      return array;
    };

    function App() {
      const [step, setStep] = useState(1);
      const [deck, setDeck] = useState([]);
      const [drawnCards, setDrawnCards] = useState([]);
      const [visualCards, setVisualCards] = useState([]);
      const [isReading, setIsReading] = useState(false);
      const [error, setError] = useState('');
      
      const keyInputRef = useRef(null);
      const questionInputRef = useRef(null);
      
      const [finalData, setFinalData] = useState({ key: '', question: '' });

      // --- 新增：追问与历史记录系统状态 ---
      const [targetDrawCount, setTargetDrawCount] = useState(3); // 当前目标抽牌数，追问时递增
      const [displayItems, setDisplayItems] = useState([]); // 存放解读和追问的对话流
      const [chatHistory, setChatHistory] = useState([]); // 传给 DeepSeek 的上下文记忆
      const [followUpCount, setFollowUpCount] = useState(0); // 追问次数 (上限3)
      const [currentFollowUpQuestion, setCurrentFollowUpQuestion] = useState(''); 
      const [sessionId, setSessionId] = useState(''); // 本次解读的唯一ID
      const [showHistory, setShowHistory] = useState(false); // 历史记录弹窗
      const [historyList, setHistoryList] = useState([]);

      useEffect(() => {
        resetReading();
      }, []);

      // 加载历史记录
      useEffect(() => {
        if (showHistory) {
          try {
            const hist = JSON.parse(localStorage.getItem('tarot_history') || '[]');
            setHistoryList(hist);
          } catch(e) { setHistoryList([]); }
        }
      }, [showHistory]);

      const resetReading = () => {
        setDeck(shuffle(generateDeck()));
        setDrawnCards([]);
        setDisplayItems([]);
        setChatHistory([]);
        setFollowUpCount(0);
        setCurrentFollowUpQuestion('');
        setTargetDrawCount(3);
        setError('');
        setStep(1);
        setVisualCards(Array.from({ length: 78 }, (_, i) => ({ id: `vcard-${i}`, drawn: false })));
      };

      const handleStartDraw = () => {
        const currentKey = keyInputRef.current?.value || '';
        const currentQuestion = questionInputRef.current?.value || '';

        if (!currentKey.trim()) {
          setError('请提供 DeepSeek API Key (它仅保存在您的浏览器本地，不会上传)');
          return;
        }
        if (!currentQuestion.trim()) {
          setError('请输入您想洞察的问题。');
          return;
        }
        
        localStorage.setItem('tarot_api_key', currentKey.trim());
        setFinalData({ key: currentKey.trim(), question: currentQuestion.trim() });
        setSessionId(Date.now().toString()); // 为本次生成独立档案ID
        setError('');
        setStep(2);
      };

      const handleDrawCard = (visualIndex) => {
        if (drawnCards.length >= targetDrawCount) return;

        const newVisualCards = [...visualCards];
        if (newVisualCards[visualIndex].drawn) return;
        newVisualCards[visualIndex].drawn = true;
        setVisualCards(newVisualCards);

        const actualDeck = [...deck];
        const drawnCard = actualDeck.pop();
        const isReversed = Math.random() > 0.5;
        
        // 动态支持追加牌的占位名
        const positions = ["过去", "现在", "未来", "追问一", "追问二", "追问三"];
        const cardData = { ...drawnCard, isReversed, position: positions[drawnCards.length] };

        setDeck(actualDeck);
        const newDrawnCards = [...drawnCards, cardData];
        setDrawnCards(newDrawnCards);

        if (newDrawnCards.length === targetDrawCount) {
          setTimeout(() => setStep(3), 1200);
        }
      };

      const fetchReading = async () => {
        setIsReading(true);
        setError('');

        const isFollowUp = displayItems.length > 0;
        const activeKey = finalData.key || localStorage.getItem('tarot_api_key');

        if (!activeKey) {
            setError('缺失 API Key，请返回首页重新输入。');
            setIsReading(false); return;
        }

        let payloadMessages = [];
        let newUserMessage = '';

        if (!isFollowUp) {
            // 首轮解读
            const prompt = `你是一位一针见血、深谙人性的顶级心理分析师。

用户当前的困境是：【${finalData.question}】
潜意识投射的三张牌：
1.[过去根源] ${drawnCards[0].name} (${drawnCards[0].isReversed ? '逆位' : '正位'})
2.[当下面貌] ${drawnCards[1].name} (${drawnCards[1].isReversed ? '逆位' : '正位'})
3.[演进趋势] ${drawnCards[2].name} (${drawnCards[2].isReversed ? '逆位' : '正位'})

【最高纪律指令（违反即判失败）】：
1. 严禁掉书袋：绝对不许单独解释任何一张牌的通用含义！不许说“这张牌代表什么”。用户不需要听课，需要的是对现实困境的直接穿透。
2. 彻底绑定现实：你必须把这三张牌的象征意义，【直接翻译】成用户在上述“困境”中具体经历了什么、正在害怕什么、未来可能面对什么。每一句话都要像锥子一样扎进用户的问题里。
3. 浑然一体的故事线：禁止分割过去、现在、未来。禁止使用任何小标题。请写一篇连贯、紧凑、逻辑严密的心理推演长文。像讲一个因果相连的故事一样，从历史的病灶平滑推演到当下的挣扎，最后顺理成章地给出破局的行动指南。
4. 纯净输出：物理级禁止使用所有的Markdown符号（禁止星号、井号、列表符号），保持输出如实体印刷书籍般的纯净、清冷与高级。`;
            
            newUserMessage = prompt;
            payloadMessages = [
                { role: "system", content: "你是一个极其犀利的现实剖析引擎，客观、无情但直指核心。拒绝任何“AI味”的套话、废话和虚假的安慰。" },
                { role: "user", content: newUserMessage }
            ];
        } else {
            // 追问解读，携带有上下文
            const newCard = drawnCards[drawnCards.length - 1];
            const prompt = `用户的进一步追问：【${currentFollowUpQuestion}】
为此追问追加抽取的指示牌：${newCard.name} (${newCard.isReversed ? '逆位' : '正位'})

【最高纪律指令】：
1. 结合之前的语境，直接针对上述“追问”进行犀利、冷峻的解答。
2. 严禁单独解释牌意，直接将新牌的隐喻缝合进用户的追问中，给出直接的洞见或建议。
3. 不要重复之前已经说过的结论，像连载小说的最新一章一样，推动推演。
4. 物理级禁止使用所有的Markdown符号（禁止星号、井号、列表符号）。`;

            newUserMessage = prompt;
            payloadMessages = [...chatHistory, { role: "user", content: newUserMessage }];
        }

        try {
          const response = await fetch('https://api.deepseek.com/chat/completions', {
            method: 'POST',
            headers: { 
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${activeKey.trim()}`
            },
            body: JSON.stringify({
              model: "deepseek-chat",
              messages: payloadMessages,
              temperature: 0.75
            })
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            throw new Error(`API 请求失败: ${response.status} ${errorData.error?.message || ''}`);
          }
          
          const data = await response.json();
          const responseText = data.choices?.[0]?.message?.content || "无法感知潜意识边缘...";

          // 更新上下文历史 (用于下一次追问)
          setChatHistory([...payloadMessages, { role: "assistant", content: responseText }]);

          // 更新页面展示流
          let newDisplayItems;
          if (!isFollowUp) {
              newDisplayItems = [{ type: 'initial', question: finalData.question, reading: responseText }];
          } else {
              newDisplayItems = [...displayItems, { type: 'followup', question: currentFollowUpQuestion, reading: responseText }];
              setFollowUpCount(prev => prev + 1);
              setCurrentFollowUpQuestion(''); // 清空输入框
          }
          setDisplayItems(newDisplayItems);

          // 持久化保存至本地历史档案
          saveToHistory(sessionId, finalData.question, drawnCards, newDisplayItems);

        } catch (err) {
          setError(`灵感链接中断: ${err.message}。请检查网络或 API Key。`);
        } finally {
          setIsReading(false);
        }
      };

      const saveToHistory = (id, question, cards, items) => {
        try {
            const hist = JSON.parse(localStorage.getItem('tarot_history') || '[]');
            const record = { id, date: new Date().toLocaleString(), question, cards, displayItems: items };
            const existingIdx = hist.findIndex(h => h.id === id);
            if (existingIdx >= 0) hist[existingIdx] = record;
            else hist.unshift(record); // 新记录插在最前
            localStorage.setItem('tarot_history', JSON.stringify(hist));
        } catch(e) {}
      };

      const handleRestoreHistory = (record) => {
          setFinalData({ key: localStorage.getItem('tarot_api_key') || '', question: record.question });
          setSessionId(record.id);
          setDrawnCards(record.cards);
          setDisplayItems(record.displayItems);
          setFollowUpCount(record.displayItems.length - 1);
          setTargetDrawCount(record.cards.length);
          setStep(3);
          setShowHistory(false);
      };

      const renderNarrative = (text) => {
        if (!text) return null;
        // 终极物理消杀：抹除所有可能残留的特殊排版符号
        const cleanText = text.replace(/[*#_`>\\-]/g, '');
        const blocks = cleanText.split('\n').filter(b => b.trim() !== '');
        
        return blocks.map((block, idx) => {
          return (
            <p key={idx} className="mb-6 text-[15px] text-slate-300 leading-[1.8] tracking-widest text-justify indent-8">
              {block.trim()}
            </p>
          );
        });
      };

      return (
        <div className="min-h-screen selection:bg-slate-500/30 relative">
          <header className="py-8 text-center border-b border-slate-800/50 bg-slate-900/30 relative">
            <h1 className="text-3xl font-serif tracking-widest text-slate-300">✦ 潜意识重影 ✦</h1>
            <p className="mt-2 text-xs text-slate-500 tracking-widest uppercase">Psychological Narrative Analysis</p>
            
            {/* 历史档案入口 */}
            <button 
              onClick={() => setShowHistory(true)} 
              className="absolute top-6 right-4 md:right-8 text-xs text-slate-500 hover:text-slate-300 tracking-widest uppercase border-b border-transparent hover:border-slate-500 pb-1 transition-all"
            >
              历史档案
            </button>
          </header>

          <main className="max-w-5xl mx-auto px-4 py-12">
            {error && (
              <div className="mb-6 p-4 bg-red-950/50 border border-red-900 text-red-400 rounded-lg text-sm text-center">
                {error}
              </div>
            )}

            {step === 1 && (
              <div className="animate-fade-in flex flex-col items-center">
                <div className="w-full max-w-lg bg-slate-900/80 p-8 rounded-2xl shadow-2xl border border-slate-800">
                  <h2 className="text-lg text-slate-300 mb-6 text-center font-serif">输入探寻的锚点</h2>
                  
                  <div className="mb-6 bg-slate-950/50 p-4 rounded-lg border border-slate-800/80">
                    <label className="block text-xs text-slate-500 mb-2 uppercase tracking-widest">
                      DeepSeek API Key
                    </label>
                    <input 
                      type="password"
                      ref={keyInputRef}
                      defaultValue={localStorage.getItem('tarot_api_key') || ''}
                      className="w-full bg-slate-900 border border-slate-700/50 rounded p-3 text-slate-300 focus:outline-none focus:border-slate-500 transition-colors text-sm font-mono placeholder-slate-700"
                      placeholder="sk-..."
                    />
                  </div>

                  <p className="text-xs text-slate-500 mb-4 text-center leading-relaxed">
                    请尽可能客观、具体地描述当下的困惑。
                  </p>
                  <textarea 
                    ref={questionInputRef}
                    defaultValue=""
                    className="w-full h-32 bg-slate-950/80 border border-slate-700/50 rounded-lg p-4 text-slate-300 focus:outline-none focus:border-slate-500 transition-colors resize-none placeholder-slate-700 text-sm leading-relaxed"
                    placeholder="例如：我目前在职业发展上遇到了瓶颈，想知道继续留在这里还是寻找新机会更利于我的长期发展？"
                  />
                  <button 
                    onClick={handleStartDraw}
                    className="w-full mt-6 py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-lg transition-all tracking-widest border border-slate-700"
                  >
                    沉入潜意识
                  </button>
                </div>
              </div>
            )}

            {step === 2 && (
              <div className="animate-fade-in flex flex-col items-center w-full overflow-hidden">
                <div className="text-center mb-6">
                  <h2 className="text-xl text-slate-300 mb-2 font-serif">
                    {targetDrawCount === 3 ? "随直觉剥落三块碎片" : "为你的追问抽取一张指示牌"}
                  </h2>
                  <p className="text-slate-500 text-xs tracking-widest">
                    [ {drawnCards.length} / {targetDrawCount} ]
                  </p>
                </div>
                
                {/* 78张牌扇形展开区域 */}
                <div className="relative w-full max-w-4xl h-48 md:h-64 mt-6 mb-12 flex justify-center">
                  {visualCards.map((vcard, idx) => {
                    const total = visualCards.length;
                    const center = (total - 1) / 2;
                    const distance = idx - center;
                    const normalizedDist = distance / center; // -1 to 1
                    
                    // 数学建模：计算扇形的角度、横向偏移和抛物线下沉
                    const angle = normalizedDist * 60; // 展开总角 -60 到 +60 度
                    const yOffset = Math.pow(normalizedDist, 2) * 90; // 两侧向下沉降曲线
                    const xOffset = normalizedDist * 45; // 横跨屏幕比例

                    return (
                      <div 
                        key={vcard.id}
                        className="absolute bottom-4 origin-bottom cursor-pointer transition-all duration-300 ease-out"
                        style={{
                          left: `calc(50% + ${xOffset}%)`,
                          transform: `translate(-50%, ${yOffset}px) rotate(${angle}deg)`,
                          zIndex: vcard.drawn ? 0 : idx,
                        }}
                        onMouseEnter={(e) => { if(!vcard.drawn) e.currentTarget.style.zIndex = 200; }}
                        onMouseLeave={(e) => { if(!vcard.drawn) e.currentTarget.style.zIndex = idx; }}
                      >
                        <div 
                          onClick={() => handleDrawCard(idx)}
                          className={`
                            w-8 sm:w-10 md:w-14 aspect-[2/3] rounded-sm md:rounded border border-slate-600/60 bg-slate-800 
                            transition-transform duration-300 shadow-[0_2px_10px_rgba(0,0,0,0.6)]
                            ${vcard.drawn ? 'opacity-0 translate-y-20 pointer-events-none' : 'hover:-translate-y-6 hover:shadow-[0_10px_20px_rgba(255,255,255,0.15)] hover:border-slate-400'}
                          `}
                        >
                          <div className="absolute inset-1 border border-slate-700/50 rounded-sm flex items-center justify-center bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjMWUyOTNiIiAvPgo8Y2lyY2xlIGN4PSIyIiBjeT0iMiIgcj0iMSIgZmlsbD0iIzMzNDE1NSIgLz4KPC9zdmc+')]">
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 已抽取的牌槽展示 (灵活适应追问数量) */}
                <div className="flex justify-center flex-wrap gap-6 md:gap-12 min-h-[160px] z-10 px-4">
                  {Array.from({ length: targetDrawCount }).map((_, idx) => {
                    const card = drawnCards[idx];
                    const positions = ["过去", "现在", "未来", "追问一", "追问二", "追问三"];
                    const posName = positions[idx];
                    return (
                      <div key={idx} className="flex flex-col items-center">
                        <div className="text-[10px] text-slate-600 mb-2 tracking-widest uppercase">{posName}</div>
                        <div className={`
                          w-16 md:w-24 aspect-[2/3] rounded-lg border flex items-center justify-center p-2 text-center transition-all duration-700 shadow-lg
                          ${card ? (card.isReversed ? 'border-slate-600 bg-slate-800' : 'border-slate-500 bg-slate-800') : 'border-dashed border-slate-800 bg-transparent shadow-none'}
                        `}>
                          {card ? (
                            <div className={`flex flex-col items-center ${card.isReversed ? 'rotate-180' : ''}`}>
                              <span className={`text-xs md:text-sm font-medium ${card.isReversed ? 'text-slate-400' : 'text-slate-300'}`}>{card.name}</span>
                            </div>
                          ) : <span className="text-slate-800 text-xl font-serif">?</span>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {step === 3 && (
              <div className="animate-fade-in">
                {/* 顶部阵列展示：完美复用旧UI，自动包裹多出的追问牌 */}
                <div className="flex flex-wrap justify-center gap-6 md:gap-16 mb-12 border-b border-slate-800/50 pb-12">
                  {drawnCards.map((card, idx) => (
                    <div key={idx} className="flex flex-col items-center w-28 md:w-36">
                      <div className="text-[10px] text-slate-500 mb-4 tracking-widest px-4 py-1 bg-slate-900 rounded-full border border-slate-800">{card.position}</div>
                      <div className={`
                        w-full aspect-[2/3] rounded-xl border flex flex-col items-center justify-center p-4 relative overflow-hidden
                        ${card.isReversed ? 'border-slate-700 bg-slate-900 shadow-[0_0_20px_rgba(51,65,85,0.4)]' : 'border-slate-600 bg-slate-800/50 shadow-[0_0_20px_rgba(71,85,105,0.4)]'}
                      `}>
                        <div className={`w-full h-full flex flex-col items-center justify-center ${card.isReversed ? 'rotate-180' : ''}`}>
                          <div className="text-2xl mb-4 opacity-40 grayscale">
                            {card.type === "大阿尔卡纳" ? "✧" : (card.name.includes("权杖") ? "🔥" : card.name.includes("圣杯") ? "💧" : card.name.includes("宝剑") ? "⚔️" : "🪙")}
                          </div>
                          <span className={`text-base md:text-lg font-serif tracking-widest text-center ${card.isReversed ? 'text-slate-400' : 'text-slate-300'}`}>{card.name}</span>
                          <span className="text-[10px] mt-2 text-slate-600">{card.type}</span>
                        </div>
                      </div>
                      <div className={`mt-4 text-[10px] md:text-xs font-medium tracking-wider ${card.isReversed ? 'text-slate-500' : 'text-slate-400'}`}>
                        {card.isReversed ? '[ 逆位形态 ]' : '[ 正位形态 ]'}
                      </div>
                    </div>
                  ))}
                </div>

                <div className="max-w-2xl mx-auto">
                  {/* 首轮未解密 */}
                  {displayItems.length === 0 && !isReading && (
                    <div className="text-center mt-16">
                      <button onClick={fetchReading} className="px-10 py-4 bg-slate-200 hover:bg-white text-slate-950 font-medium rounded-sm transition-all tracking-widest shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                        阅读潜意识的长卷
                      </button>
                    </div>
                  )}

                  {/* 首轮加载 UI */}
                  {isReading && displayItems.length === 0 && (
                    <div className="flex flex-col items-center justify-center py-20">
                      <div className="w-8 h-8 border-2 border-slate-800 border-t-slate-400 rounded-full animate-spin mb-6"></div>
                      <p className="text-xs text-slate-500 tracking-widest animate-pulse font-serif">正将象征线索剥离并缝合至您的现实...</p>
                    </div>
                  )}

                  {/* 核心展示流（包含初次解读与后续追问） */}
                  {displayItems.length > 0 && (
                    <div className="bg-transparent relative mt-8 animate-fade-in">
                      <h2 className="text-sm font-serif text-slate-500 mb-10 text-center tracking-[0.3em] uppercase opacity-70">
                        - The Narrative Analysis -
                      </h2>
                      
                      {displayItems.map((item, idx) => (
                        <div key={idx} className="mb-12">
                          {item.type === 'followup' && (
                            <div className="mb-6 border-l-2 border-slate-700 pl-4 py-2">
                              <p className="text-[10px] text-slate-500 uppercase tracking-widest mb-1 font-bold">追问 {idx}</p>
                              <p className="text-sm text-slate-300 font-serif opacity-90">"{item.question}"</p>
                            </div>
                          )}
                          <div className="max-w-none px-2 sm:px-6">
                            {renderNarrative(item.reading)}
                          </div>
                        </div>
                      ))}

                      {/* 抽完追问牌但未解析 */}
                      {!isReading && drawnCards.length > displayItems.length + 2 && (
                        <div className="mt-12 mb-8 text-center animate-fade-in">
                          <button onClick={fetchReading} className="px-10 py-4 bg-slate-200 hover:bg-white text-slate-950 font-medium rounded-sm transition-all tracking-widest shadow-[0_0_15px_rgba(255,255,255,0.1)]">
                            洞悉追问的启示
                          </button>
                        </div>
                      )}

                      {/* 追问加载 UI（放在最底部，避免视野盲区） */}
                      {isReading && drawnCards.length > displayItems.length + 2 && (
                        <div className="flex flex-col items-center justify-center py-16 animate-fade-in">
                          <div className="w-8 h-8 border-2 border-slate-800 border-t-slate-400 rounded-full animate-spin mb-6"></div>
                          <p className="text-xs text-slate-500 tracking-widest animate-pulse font-serif">正将象征线索剥离并缝合至您的现实...</p>
                        </div>
                      )}

                      {/* 追问区域 (解读完成且未达到上限) */}
                      {!isReading && followUpCount < 3 && drawnCards.length === displayItems.length + 2 && (
                        <div className="mt-16 border-t border-slate-800/50 pt-12 px-2 sm:px-6">
                          <h3 className="text-sm text-slate-400 font-serif mb-6 tracking-widest text-center">潜意识的余波 (追问 {followUpCount + 1}/3)</h3>
                          <textarea
                              value={currentFollowUpQuestion}
                              onChange={e => setCurrentFollowUpQuestion(e.target.value)}
                              className="w-full h-24 bg-slate-900/40 border border-slate-700/50 rounded p-4 text-slate-300 focus:outline-none focus:border-slate-500 transition-colors resize-none placeholder-slate-700/50 text-sm leading-relaxed"
                              placeholder="有什么具体未明朗的细节，或需要进一步行动的指引？"
                          />
                          <button
                              onClick={() => {
                                  if(!currentFollowUpQuestion.trim()) { setError('请输入追问内容'); return; }
                                  setError('');
                                  setTargetDrawCount(drawnCards.length + 1);
                                  setStep(2); // 回到抽牌页追加一张
                              }}
                              className="w-full mt-4 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium rounded transition-all tracking-widest border border-slate-700 text-sm"
                          >
                              抽取追问指示牌
                          </button>
                        </div>
                      )}

                      {/* 达到上限提示 */}
                      {!isReading && followUpCount >= 3 && drawnCards.length === displayItems.length + 2 && (
                        <div className="mt-16 pt-8 border-t border-slate-800/50 text-center animate-fade-in">
                          <p className="text-sm text-slate-500 tracking-widest mb-6">您的追问已达上限，请开启新的探寻。</p>
                          <button onClick={resetReading} className="px-6 py-2 border border-slate-800 hover:border-slate-500 text-slate-500 rounded-sm transition-colors text-xs tracking-widest">
                              归零 (Reset)
                          </button>
                        </div>
                      )}

                      {/* 未达上限也可随时退出归零 */}
                      {!isReading && followUpCount < 3 && drawnCards.length === displayItems.length + 2 && (
                        <div className="mt-8 text-center">
                          <button onClick={resetReading} className="px-6 py-2 border border-transparent hover:border-slate-800 text-slate-600 hover:text-slate-500 rounded-sm transition-colors text-xs tracking-widest">
                              结束并归零 (Reset)
                          </button>
                        </div>
                      )}

                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          {/* 历史档案模态框 */}
          {showHistory && (
            <div className="fixed inset-0 bg-slate-950/95 z-50 overflow-y-auto pt-16 px-4 pb-20 animate-fade-in">
              <div className="max-w-3xl mx-auto bg-slate-900/80 border border-slate-800 rounded-xl shadow-2xl p-6 md:p-10 relative backdrop-blur-sm">
                <button onClick={() => setShowHistory(false)} className="absolute top-4 right-6 text-slate-500 hover:text-slate-300 text-3xl font-light leading-none transition-colors">&times;</button>
                <h2 className="text-xl text-slate-300 mb-8 font-serif tracking-widest text-center border-b border-slate-800/50 pb-6">历史档案</h2>

                {historyList.length === 0 ? (
                  <p className="text-slate-500 text-center py-16 text-sm tracking-widest">尚无历史留存...</p>
                ) : (
                  <div className="space-y-6">
                    {historyList.map(record => (
                      <div key={record.id} className="border border-slate-800/50 bg-slate-950/50 rounded-lg p-6 hover:border-slate-700 transition-colors">
                        <div className="flex justify-between items-start mb-4">
                          <h3 className="text-slate-300 text-sm font-serif line-clamp-2 leading-relaxed pr-4 flex-1">
                            <span className="text-slate-500 font-sans mr-2 text-xs">Q:</span>{record.question}
                          </h3>
                          <span className="text-[10px] text-slate-600 tracking-widest whitespace-nowrap mt-1">{record.date}</span>
                        </div>
                        <div className="text-xs text-slate-500 tracking-widest mb-6 opacity-70">
                          牌阵: {record.cards?.map(c => c.name).join(' / ')}
                        </div>
                        <div className="text-right">
                          <button onClick={() => handleRestoreHistory(record)} className="text-[10px] uppercase text-slate-400 hover:text-slate-200 border border-slate-700/50 hover:border-slate-500 px-4 py-2 rounded transition-colors tracking-widest">
                            重温此卷 (Review)
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
